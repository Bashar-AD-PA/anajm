<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة منتج متكامل - لوحة الإدارة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4 py-10">

    <div class="bg-white shadow-xl rounded-3xl w-full max-w-lg p-8">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-bold text-gray-800">إضافة منتج جديد</h2>
            <a href="index.html" class="text-gray-400 hover:text-blue-600 transition">
                <i class="fas fa-times text-xl"></i>
            </a>
        </div>

        <form id="productForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">صورة المنتج</label>
                <input type="file" id="imageInput" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" accept="image/*" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">اسم المنتج</label>
                <input type="text" id="name" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">السعر (ر.س)</label>
                    <input type="number" step="0.01" id="price" class="w-full px-4 py-3 border border-gray-200 rounded-xl" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">الكمية</label>
                    <input type="number" id="stock" class="w-full px-4 py-3 border border-gray-200 rounded-xl" required>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">المادة</label>
                    <select id="material" class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none">
                        <option value="PP">PP (بولي بروبيلين)</option>
                        <option value="PET">PET</option>
                        <option value="HDPE">HDPE</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">الوزن (جرام)</label>
                    <input type="number" id="weight" class="w-full px-4 py-3 border border-gray-200 rounded-xl" placeholder="500" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">وصف المنتج</label>
                <textarea id="description" rows="2" class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none"></textarea>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition flex items-center justify-center gap-2">
                <i class="fas fa-save"></i> حفظ المنتج في المخزن
            </button>
        </form>
    </div>

    <script>
        const SUPABASE_URL = 'https://glvsedqxcclnqeriqpem.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsdnNlZHF4Y2NsbnFlcmlxcGVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA1NzAyNDMsImV4cCI6MjA4NjE0NjI0M30.pMNRywVIOKS8mrimB181iNKZgK42yH331GWYuiwbHdw';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const productForm = document.getElementById('productForm');

        productForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'جاري المعالجة...';

            // 1. جلب القيم من الـ HTML
            const file = document.getElementById('imageInput').files[0];
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            const stock = document.getElementById('stock').value;
            const material = document.getElementById('material').value;
            const description = document.getElementById('description').value;
            const weight = document.getElementById('weight').value;

            try {
                // 2. رفع الصورة أولاً
                const fileExt = file.name.split('.').pop();
                const fileName = `${Math.random()}.${fileExt}`;
                const filePath = `products/${fileName}`;

                const { error: uploadError } = await _supabase.storage
                    .from('product-images')
                    .upload(filePath, file);

                if (uploadError) throw uploadError;

                const { data: urlData } = _supabase.storage.from('product-images').getPublicUrl(filePath);
                const imageUrl = urlData.publicUrl;

                // 3. إرسال البيانات للجدول
                const { error: productError } = await _supabase
                    .from('products')
                    .insert([{ 
                        name, 
                        price: parseFloat(price), 
                        stock_quantity: parseInt(stock), 
                        material_type: material, 
                        weight_grams: parseInt(weight),
                        image_url: imageUrl,
                        is_active: true,
                        description 
                    }]);

                if (productError) throw productError;

                alert("تم الحفظ بنجاح!");
                window.location.href = 'index.html';

            } catch (err) {
                alert("حدث خطأ: " + err.message);
                btn.disabled = false;
                btn.innerText = 'حفظ المنتج في المخزن';
            }
        });

        // حماية الإدارة
        async function checkAdmin() {
    const { data: { user } } = await _supabase.auth.getUser();
    if (!user) { window.location.href = 'login.html'; return; }
    
    const { data: profile } = await _supabase.from('profiles').select('role').eq('id', user.id).single();
    
    if (profile?.role !== 'admin') {
        alert("عذراً، هذه الصفحة للمدراء فقط");
        window.location.href = 'index.html';
    } else {
        // إذا كان مديراً، أظهر الصفحة
        document.getElementById('adminBody').classList.remove('opacity-0');
    }
}
        checkAdmin();
    </script>
</body>
</html>
