<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المشتريات - متجر البلاستيك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap');
        body { font-family: 'Almarai', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black text-gray-800">سلة المشتريات <i class="fas fa-shopping-basket text-blue-600"></i></h1>
            <a href="index.html" class="text-blue-600 font-bold hover:underline flex items-center gap-2">
                 العودة للتسوق <i class="fas fa-arrow-left text-sm"></i>
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-4" id="cartItems">
                </div>

            <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-gray-100 h-fit sticky top-10">
                <h2 class="text-xl font-bold mb-6 pb-4 border-b border-gray-50">ملخص الفاتورة</h2>
                
                <div class="space-y-4 mb-8">
                    <div class="flex justify-between text-gray-500 font-bold">
                        <span>إجمالي المنتجات:</span>
                        <span id="subtotal">0.00 ر.س</span>
                    </div>
                    <div class="flex justify-between text-gray-400 text-sm">
                        <span>ضريبة القيمة المضافة (15%):</span>
                        <span id="tax">0.00 ر.س</span>
                    </div>
                    <div class="flex justify-between text-2xl font-black text-blue-600 pt-4 border-t border-gray-100">
                        <span>المجموع الكلي:</span>
                        <span id="total">0.00 ر.س</span>
                    </div>
                </div>

                <button onclick="goToCheckout()" id="checkoutBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 transition shadow-lg shadow-blue-100 flex items-center justify-center gap-2">
                    الاستمرار للدفع <i class="fas fa-credit-card"></i>
                </button>
                
                <p class="text-[10px] text-gray-400 text-center mt-4">بضغطك على الزر سيتم توجيهك لصفحة الدفع الآمن</p>
            </div>
        </div>
    </div>

    <script>
        function loadCart() {
            const cartItems = JSON.parse(localStorage.getItem('plastic_cart')) || [];
            const container = document.getElementById('cartItems');
            const checkoutBtn = document.getElementById('checkoutBtn');
            let subtotal = 0;

            if (cartItems.length === 0) {
                container.innerHTML = `
                    <div class="bg-white p-20 rounded-[2rem] text-center border-2 border-dashed border-gray-200">
                        <div class="bg-gray-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i class="fas fa-shopping-cart text-4xl text-gray-200"></i>
                        </div>
                        <p class="text-gray-400 text-xl font-bold">سلتك فارغة حالياً..</p>
                        <a href="index.html" class="inline-block mt-6 bg-blue-600 text-white px-10 py-3 rounded-2xl font-bold shadow-lg shadow-blue-100 transition hover:bg-blue-700">ابدأ التسوق</a>
                    </div>`;
                updateSummary(0);
                checkoutBtn.classList.add('opacity-50', 'cursor-not-allowed');
                checkoutBtn.disabled = true;
                return;
            }

            container.innerHTML = cartItems.map((item, index) => {
                const itemTotal = item.price * item.qty;
                subtotal += itemTotal;
                return `
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex items-center gap-6 group hover:border-blue-200 transition">
                        <img src="${item.image || 'https://via.placeholder.com/150'}" class="w-24 h-24 object-cover rounded-2xl bg-gray-50 shadow-inner">
                        <div class="flex-1">
                            <h3 class="font-bold text-gray-800 text-lg">${item.name}</h3>
                            <p class="text-gray-400 text-sm font-bold">السعر: ${item.price} ر.س</p>
                            <div class="flex items-center gap-4 mt-3">
                                <div class="flex items-center border border-gray-100 rounded-xl overflow-hidden">
                                    <button onclick="changeQty(${index}, -1)" class="px-3 py-1 bg-gray-50 hover:bg-gray-100">-</button>
                                    <span class="px-4 py-1 text-sm font-black text-blue-600">${item.qty}</span>
                                    <button onclick="changeQty(${index}, 1)" class="px-3 py-1 bg-gray-50 hover:bg-gray-100">+</button>
                                </div>
                                <button onclick="removeItem(${index})" class="text-red-400 hover:text-red-600 transition text-sm font-bold">
                                    <i class="fas fa-trash-alt ml-1"></i> حذف
                                </button>
                            </div>
                        </div>
                        <div class="text-left">
                            <p class="text-xl font-black text-gray-800">${itemTotal.toFixed(2)} <small class="text-xs">ر.س</small></p>
                        </div>
                    </div>
                `;
            }).join('');

            updateSummary(subtotal);
        }

        function updateSummary(subtotal) {
            const tax = subtotal * 0.15;
            const total = subtotal + tax;

            document.getElementById('subtotal').innerText = subtotal.toFixed(2) + ' ر.س';
            document.getElementById('tax').innerText = tax.toFixed(2) + ' ر.س';
            document.getElementById('total').innerText = total.toFixed(2) + ' ر.س';
        }

        function changeQty(index, amount) {
            let cart = JSON.parse(localStorage.getItem('plastic_cart')) || [];
            cart[index].qty += amount;
            if (cart[index].qty <= 0) return removeItem(index);
            localStorage.setItem('plastic_cart', JSON.stringify(cart));
            loadCart();
        }

        function removeItem(index) {
            if(confirm('هل تريد إزالة هذا المنتج من السلة؟')) {
                let cart = JSON.parse(localStorage.getItem('plastic_cart')) || [];
                cart.splice(index, 1);
                localStorage.setItem('plastic_cart', JSON.stringify(cart));
                loadCart();
            }
        }

        // الوظيفة الجديدة: التوجيه لصفحة الدفع
        function goToCheckout() {
            const cartItems = JSON.parse(localStorage.getItem('plastic_cart')) || [];
            if (cartItems.length === 0) return alert("السلة فارغة!");
            
            // بدلاً من الحفظ هنا، نذهب لصفحة checkout لتأكيد البيانات والدفع
            window.location.href = 'checkout.html';
        }

        loadCart();
        window.addEventListener('storage', () => {
    loadCart(); // سيعيد تحميل السلة فوراً إذا تم مسحها من صفحة الدفع
});

// ميزة: إظهار عداد المنتجات في عنوان الصفحة
function updateTitle() {
    const cart = JSON.parse(localStorage.getItem('plastic_cart')) || [];
    if (cart.length > 0) {
        document.title = `(${cart.length}) سلة المشتريات - متجر البلاستيك`;
    } else {
        document.title = `سلة المشتريات - متجر البلاستيك`;
    }
}
// استدعاء الوظيفة عند التحميل
updateTitle();
    </script>
</body>
</html>
