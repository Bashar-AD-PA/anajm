<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلباتي - متجر البلاستيك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap');
        body { font-family: 'Almarai', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 p-6">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black text-gray-800">قائمة طلباتي <i class="fas fa-box text-blue-600"></i></h1>
            <a href="index.html" class="bg-white px-6 py-2 rounded-xl shadow-sm hover:shadow-md transition text-blue-600 font-bold">العودة للمتجر</a>
        </div>

        <div id="ordersList" class="space-y-6">
            <div class="text-center py-20 opacity-50">جاري تحميل طلباتك...</div>
        </div>
    </div>

    <script>
        // إعدادات Supabase (تأكد من مطابقتها لإعداداتك)
        const SUPABASE_URL = 'https://glvsedqxcclnqeriqpem.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // ضع مفتاحك الكامل هنا
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadOrders() {
    const { data: { user } } = await _supabase.auth.getUser();
    if (!user) { window.location.href = 'login.html'; return; }

    // جلب الطلبات مع تفاصيل المنتجات المرتبطة بها من جدول order_items
    const { data: orders, error } = await _supabase
        .from('orders')
        .select(`
            *,
            order_items (
                quantity,
                unit_price,
                products ( name, image_url )
            )
        `)
        .eq('user_id', user.id)
        .order('created_at', { ascending: false });

    const container = document.getElementById('ordersList');
    if (error || !orders || orders.length === 0) {
        container.innerHTML = `
            <div class="bg-white p-20 rounded-[3rem] text-center shadow-sm border-2 border-dashed border-gray-100">
                <i class="fas fa-box-open text-5xl text-gray-200 mb-4 block"></i>
                <p class="text-gray-500 font-bold">لا توجد طلبات سابقة حتى الآن.</p>
                <a href="index.html" class="inline-block mt-4 text-blue-600 font-bold underline">ابدأ طلبك الأول الآن</a>
            </div>`;
        return;
    }

    container.innerHTML = ''; 

    orders.forEach(order => {
        // تجميع أسماء المنتجات المختصرة للعرض
        const itemsSummary = order.order_items.map(oi => oi.products.name).join('، ');
        
        container.innerHTML += `
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 transition hover:border-blue-200">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-md font-mono">
                            #${order.id.slice(0,8).toUpperCase()}
                        </span>
                        <h3 class="text-xl font-black text-gray-800 mt-2">${order.total_amount.toFixed(2)} ر.س</h3>
                    </div>
                    <span class="status-badge px-4 py-1.5 rounded-full text-xs font-bold ${getStatusClass(order.status)}">
                        <i class="fas ${getStatusIcon(order.status)} ml-1"></i> ${translateStatus(order.status)}
                    </span>
                </div>
                
                <div class="space-y-3 bg-gray-50 p-4 rounded-2xl border border-gray-50 mb-4">
                    <p class="text-sm text-gray-600 font-bold">
                        <i class="fas fa-shopping-bag ml-2 text-blue-400"></i> ${itemsSummary}
                    </p>
                    <p class="text-xs text-gray-400">
                        <i class="fas fa-map-marker-alt ml-2"></i> ${order.address || 'عنوان مسجل مسبقاً'}
                    </p>
                    <p class="text-[10px] text-gray-400">
                        <i class="far fa-calendar-alt ml-2"></i> ${new Date(order.created_at).toLocaleString('ar-SA')}
                    </p>
                </div>
                
                <button onclick="reorderAndGo('${btoa(JSON.stringify(order.order_items))}')" 
                    class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 active:scale-[0.98] transition">
                    <i class="fas fa-redo ml-2"></i> تكرار الطلب
                </button>
            </div>
        `;
    });
}
function getStatusClass(s) {
    if(s === 'paid') return 'bg-green-100 text-green-600';
    if(s === 'shipped') return 'bg-blue-100 text-blue-600';
    return 'bg-yellow-100 text-yellow-600';
}
function getStatusIcon(s) {
    if(s === 'paid') return 'fa-check-circle';
    if(s === 'shipped') return 'fa-truck';
    return 'fa-clock';
}
function translateStatus(s) {
    const map = { 'paid': 'تم الدفع', 'pending': 'قيد المعالجة', 'shipped': 'جاري التوصيل' };
    return map[s] || s;
}

function reorderAndGo(base64) {
    const rawItems = JSON.parse(atob(base64));
    // تحويل البيانات لشكل السلة المتوقع
    const cartFormat = rawItems.map(oi => ({
        id: oi.product_id,
        name: oi.products.name,
        price: oi.unit_price,
        qty: oi.quantity,
        image: oi.products.image_url
    }));
    localStorage.setItem('plastic_cart', JSON.stringify(cartFormat));
    window.location.href = 'cart.html';
}

        // ميزة إعادة الطلب (Re-order Feature)
        function reorder(itemsBase64) {
            const items = JSON.parse(atob(itemsBase64));
            localStorage.setItem('plastic_cart', JSON.stringify(items));
            alert('تمت إضافة المنتجات لسلتك مرة أخرى!');
            window.location.href = 'cart.html';
        }

        loadOrders();
    </script>
</body>
</html>
