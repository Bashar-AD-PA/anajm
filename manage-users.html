<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <title>إدارة مستخدمي المصنع - الصلاحيات</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap');
        body { font-family: 'Almarai', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 p-6 min-h-screen">
    <div class="max-w-6xl mx-auto">
        
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <div class="bg-purple-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-purple-100">
                    <i class="fas fa-user-shield text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black text-gray-800">إدارة الصلاحيات</h1>
                    <p class="text-gray-500 text-sm">تعديل أدوار الموظفين والتحكم في وصول النظام</p>
                </div>
            </div>
            <a href="index.html" class="bg-white px-6 py-3 rounded-2xl shadow-sm border border-gray-100 hover:bg-gray-50 transition-all font-bold text-gray-600 flex items-center gap-2">
                <i class="fas fa-arrow-right"></i> العودة للرئيسية
            </a>
        </header>

        <div class="bg-white rounded-[2rem] shadow-xl shadow-gray-200/50 border border-gray-100 overflow-hidden">
            <table class="w-full text-right border-collapse">
                <thead>
                    <tr class="bg-gray-50/50 border-b border-gray-100 text-gray-400 text-xs uppercase tracking-widest">
                        <th class="px-8 py-5 font-black">اسم المستخدم</th>
                        <th class="px-8 py-5 font-black">المعرف (ID)</th>
                        <th class="px-8 py-5 font-black text-center">الرتبة الحالية</th>
                        <th class="px-8 py-5 font-black text-center">تغيير الصلاحية</th>
                    </tr>
                </thead>
                <tbody id="usersTable" class="divide-y divide-gray-50 text-gray-700">
                    <tr>
                        <td colspan="4" class="text-center py-20 text-gray-400">جاري جلب قائمة المستخدمين...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://glvsedqxcclnqeriqpem.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsdnNlZHF4Y2NsbnFlcmlxcGVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA1NzAyNDMsImV4cCI6MjA4NjE0NjI0M30.pMNRywVIOKS8mrimB181iNKZgK42yH331GWYuiwbHdw';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // تحميل المستخدمين عند فتح الصفحة
        async function loadUsers() {
            const { data: users, error } = await _supabase
                .from('profiles')
                .select('*')
                .order('role', { ascending: false });

            if (error) {
                console.error('Error:', error);
                return;
            }

            const table = document.getElementById('usersTable');
            table.innerHTML = users.map(user => `
                <tr class="hover:bg-gray-50/80 transition-all group">
                    <td class="px-8 py-6 font-bold text-gray-800">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-[10px]">
                                ${user.full_name.charAt(0)}
                            </div>
                            ${user.full_name}
                        </div>
                    </td>
                    <td class="px-8 py-6 font-mono text-[10px] text-gray-400">${user.id}</td>
                    <td class="px-8 py-6 text-center">
                        <span class="px-4 py-1.5 rounded-xl text-[10px] font-black tracking-tighter shadow-sm ${getRoleStyle(user.role)}">
                            ${translateRole(user.role)}
                        </span>
                    </td>
                    <td class="px-8 py-6 text-center">
                        <select onchange="updateRole('${user.id}', this.value)" 
                                class="bg-white border border-gray-200 rounded-xl px-3 py-2 text-xs font-bold outline-none focus:ring-2 focus:ring-purple-500 cursor-pointer hover:border-purple-300 transition-all shadow-sm">
                            <option value="customer" ${user.role === 'customer' ? 'selected' : ''}>عميل</option>
                            <option value="employee" ${user.role === 'employee' ? 'selected' : ''}>موظف</option>
                            <option value="guard" ${user.role === 'guard' ? 'selected' : ''}>حارس أمن</option>
                            <option value="supervisor" ${user.role === 'supervisor' ? 'selected' : ''}>مشرف</option>
                            <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>مدير نظام</option>
                        </select>
                    </td>
                </tr>
            `).join('');
        }

        // تحديث الرتبة في قاعدة البيانات
        async function updateRole(userId, newRole) {
    if (!confirm(`هل أنت متأكد من تغيير صلاحية هذا المستخدم؟`)) {
        loadUsers();
        return;
    }

    const { data: { user: adminUser } } = await _supabase.auth.getUser();

    // 1. تحديث الرتبة
    const { error: updateError } = await _supabase
        .from('profiles')
        .update({ role: newRole })
        .eq('id', userId);

    if (updateError) {
        alert('فشل التحديث: ' + updateError.message);
        return;
    }

    // 2. تسجيل العملية في سجلات النظام (اختياري ولكنه احترافي)
    await _supabase.from('system_logs').insert([{
        action: 'تغيير صلاحية',
        details: `تم تغيير رتبة المستخدم ${userId} إلى ${newRole}`,
        performed_by: adminUser.id
    }]);

    loadUsers();
}

        // تحويل أسماء الرتب للعربية
        function translateRole(role) {
            const roles = { 
                admin: 'مدير النظام', 
                guard: 'حارس أمن', 
                customer: 'عميل', 
                employee: 'موظف مصنع', 
                supervisor: 'مشرف إنتاج' 
            };
            return roles[role] || role;
        }

        // تنسيق ألوان الرتب
        function getRoleStyle(role) {
            if (role === 'admin') return 'bg-purple-600 text-white';
            if (role === 'guard') return 'bg-orange-100 text-orange-600';
            if (role === 'customer') return 'bg-green-100 text-green-600';
            if (role === 'supervisor') return 'bg-blue-600 text-white';
            return 'bg-blue-50 text-blue-500';
        }

        // حماية الصفحة: لا يدخلها إلا الأدمن
        async function checkAdminStatus() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }
            
            const { data: profile } = await _supabase.from('profiles').select('role').eq('id', user.id).single();
            if (profile?.role !== 'admin') {
                alert("صلاحياتك لا تسمح بدخول هذه الصفحة!");
                window.location.href = 'index.html';
            } else {
                loadUsers();
            }
        }

        checkAdminStatus();
    </script>
</body>
</html>
